name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Formatting (black --check)
        run: black src tests demo --check

      - name: Lint (ruff)
        run: ruff check src tests demo

      # The unit suite is fully synthetic-fixture based, so it runs without
      # the NASA dataset present.
      - name: Tests (pytest)
        run: pytest tests/unit -q
